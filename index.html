<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Form</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { background-color: #ffffff; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .section-title { background-color: #0056b3; color: white; padding: 10px; border-radius: 4px; margin-top: 20px; margin-bottom: 15px; font-size: 16px; }
        
        /* Grid Layouts */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; } /* New 3-column layout for names */
        
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input[type="text"], input[type="date"], input[type="tel"], select, input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[type="file"] { background-color: #f9f9f9; }
        .submit-btn { background-color: #28a745; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 25px; font-weight: bold; }
        .submit-btn:disabled { background-color: #6c757d; cursor: not-allowed; }
        .helper-text { font-size: 12px; color: #888; margin-top: 4px; }
        
        /* Success Message Styling */
        #successMessage { display: none; text-align: center; color: #28a745; font-weight: bold; font-size: 26px; padding: 50px 0; }

        /* Mobile Responsiveness */
        @media (max-width: 600px) { 
            .form-grid, .form-grid-3 { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="formTitle">Data Entry Form</h2>
    
    <div id="successMessage">
        SUCCESS!<br>
        <span style="font-size: 16px; color: #555; font-weight: normal; margin-top: 10px; display: block;">Data has been submitted successfully. Redirecting in 3 seconds...</span>
    </div>

    <form id="dataForm">
        <div class="section-title">Personal Information</div>
        
        <div class="form-grid-3">
            <div class="form-group"><label>First Name</label><input type="text" name="firstName" required></div>
            <div class="form-group"><label>Middle Name</label><input type="text" name="middleName"></div>
            <div class="form-group"><label>Last Name</label><input type="text" name="lastName" required></div>
        </div>

        <div class="form-grid">
            <div class="form-group"><label>DOB</label><input type="date" name="dob"></div>
            <div class="form-group"><label>Mobile No.</label><input type="tel" name="mobileNo" pattern="[0-9]{10}"></div>
            <div class="form-group"><label>Father Name</label><input type="text" name="fatherName"></div>
            <div class="form-group"><label>Mother Name</label><input type="text" name="motherName"></div>
            <div class="form-group"><label>Spouse Name</label><input type="text" name="spouseName"></div>
            <div class="form-group">
                <label>Marital Status</label>
                <select name="maritalStatus">
                    <option value="" disabled selected>Select Status</option>
                    <option value="Married">Married</option>
                    <option value="Unmarried">Unmarried</option>
                    <option value="Divorced">Divorced</option>
                </select>
            </div>
        </div>

        <div class="section-title">Address Details</div>
        <div class="form-grid">
            <div class="form-group"><label>Village</label><input type="text" name="village"></div>
            <div class="form-group"><label>Post</label><input type="text" name="post"></div>
            <div class="form-group"><label>PS (Police Station)</label><input type="text" name="ps"></div>
            <div class="form-group"><label>Block / Municipality</label><input type="text" name="block"></div>
            <div class="form-group"><label>GP / Ward</label><input type="text" name="gpWard"></div>
            <div class="form-group"><label>PIN No.</label><input type="text" name="pinNo" pattern="[0-9]{6}"></div>
        </div>

        <div class="section-title">Bank Details</div>
        <div class="form-grid">
            <div class="form-group"><label>Bank Name</label><input type="text" name="bankName"></div>
            <div class="form-group"><label>Branch Name</label><input type="text" name="branchName"></div>
            <div class="form-group"><label>IFSC Code</label><input type="text" name="ifsc"></div>
            <div class="form-group"><label>Account No.</label><input type="text" name="accountNo"></div>
        </div>

        <div class="section-title">Document Uploads</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Passport Size Photo</label>
                <input type="file" id="passportPhoto" accept="image/*" onchange="validateFileSize(this)" required>
                <span class="helper-text">Max size: 100KB</span>
            </div>
            <div class="form-group">
                <label>Aadhar Card</label>
                <input type="file" id="aadharCard" accept="image/*,.pdf" onchange="validateFileSize(this)" required>
                <span class="helper-text">Max size: 100KB</span>
            </div>
            <div class="form-group">
                <label>Bank Passbook</label>
                <input type="file" id="bankPassbook" accept="image/*,.pdf" onchange="validateFileSize(this)" required>
                <span class="helper-text">Max size: 100KB</span>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Data</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgpjUbRt1-3butyYnm1wbaJ51P85tc74RGFcrc3EYGDt7tdlXfAiDpvUn3BNIWfjZKRw/exec"; 

    function validateFileSize(input) {
        if (input.files && input.files[0] && input.files[0].size > 102400) {
            alert("ফাইলটি অনেক বড়! দয়া করে 100KB এর ছোট ফাইল আপলোড করুন।");
            input.value = ""; 
        }
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('dataForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting Data, Please Wait...";

        const formData = new FormData(this);
        let data = Object.fromEntries(formData.entries());

        const passportFile = document.getElementById('passportPhoto').files[0];
        const aadharFile = document.getElementById('aadharCard').files[0];
        const passbookFile = document.getElementById('bankPassbook').files[0];

        try {
            data.passportPhoto = passportFile ? { name: passportFile.name, type: passportFile.type, data: await getBase64(passportFile) } : null;
            data.aadharCard = aadharFile ? { name: aadharFile.name, type: aadharFile.type, data: await getBase64(aadharFile) } : null;
            data.bankPassbook = passbookFile ? { name: passbookFile.name, type: passbookFile.type, data: await getBase64(passbookFile) } : null;

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    document.getElementById('dataForm').style.display = 'none';
                    document.getElementById('formTitle').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } else {
                    alert("Error: " + result.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Data";
                }
            })
            .catch(error => {
                alert("Submission failed! Check your internet connection or URL.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Data";
            });

        } catch (error) {
            alert("Error processing files!");
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Data";
        }
    });
</script>

</body>
</html>

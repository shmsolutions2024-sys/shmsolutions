<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাবলিক সুরক্ষিত নোটপ্যাড</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
            background-color: #fcfcfc;
        }
        textarea:focus {
            border-color: #007bff;
            outline: none;
        }
        textarea:disabled {
            background-color: #f9f9f9;
            color: #555;
            cursor: not-allowed;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .status {
            font-size: 12px;
            color: #999;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>পাবলিক প্রটেক্টেড নোটপ্যাড</h1>
    <p>যে কেউ এই পেজটি দেখতে পাবে। এডিট করার জন্য "Unlock to Edit" বাটনে ক্লিক করুন।</p>
    
    <textarea id="notepad" placeholder="ক্লাউড ডাটা লোড হচ্ছে..." disabled></textarea>
    
    <div class="controls">
        <button id="authBtn" onclick="toggleEdit()">Unlock to Edit</button>
        <div id="status" class="status">ক্লাউড ডাটা লোড হচ্ছে...</div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // এখানে আপনার আসল Firebase কনফিগারেশন কোডটি বসাবেন
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase ইনিশিয়ালাইজ করা
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const noteRef = database.ref('public_note');

    const notepad = document.getElementById('notepad');
    const status = document.getElementById('status');
    const authBtn = document.getElementById('authBtn');
    
    let isAuthorized = false;

    // ১. ক্লাউড থেকে রিয়েল-টাইম লেখা নিয়ে আসা
    noteRef.on('value', (snapshot) => {
        // সমাধান: আমি নিজে আনলকড থাকলে ক্লাউড থেকে কোনো ডাটা এসে স্ক্রিনের লেখাকে মুছতে পারবে না
        if (!isAuthorized) {
            notepad.value = snapshot.val() || "";
            status.textContent = "Viewing Mode (Read-Only)";
        }
    });

    // ২. পাসওয়ার্ড ভেরিফিকেশন এবং লক করার লজিক
    function toggleEdit() {
        if (!isAuthorized) {
            const password = prompt("এডিট করার জন্য পাসওয়ার্ড দিন:");
            
            if (password === "365365") {
                isAuthorized = true;
                notepad.disabled = false; 
                authBtn.textContent = "Lock Editing";
                authBtn.style.backgroundColor = "#dc3545"; 
                status.textContent = "unlocked. পরিবর্তনগুলো ক্লাউডে সেভ হচ্ছে।";
                notepad.focus();
            } else if (password !== null) {
                alert("ভুল পাসওয়ার্ড! এক্সেস রিফিউজড।");
            }
        } else {
            // সমাধান: লক করার ঠিক আগের মুহূর্তে স্ক্রিনে যা আছে তা নিশ্চিতভাবে ক্লাউডে সেভ করা
            status.textContent = "সর্বশেষ পরিবর্তনগুলো সেভ হচ্ছে...";
            noteRef.set(notepad.value)
                .then(() => {
                    // সফলভাবে সেভ হওয়ার পরেই কেবল এডিটর লক হবে
                    isAuthorized = false;
                    notepad.disabled = true;
                    authBtn.textContent = "Unlock to Edit";
                    authBtn.style.backgroundColor = "#007bff";
                    status.textContent = "Saved & Locked! (Read-Only Mode)";
                })
                .catch((error) => {
                    alert("ফাইনাল সেভ করতে সমস্যা হয়েছে: " + error.message);
                });
        }
    }

    // ৩. টাইপ করার সাথে সাথে লাইভ সেভ করা
    notepad.addEventListener('input', () => {
        if (!isAuthorized) return;
        
        status.textContent = "ক্লাউডে সেভ হচ্ছে...";
        noteRef.set(notepad.value)
            .then(() => {
                status.textContent = "Saved!";
            })
            .catch((error) => {
                status.textContent = "Sync error: " + error.message;
            });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* এডিটরের সাইজ নির্ধারণ */
        #editor-container {
            height: 400px;
            background-color: #fcfcfc;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }
        /* লক থাকা অবস্থায় এডিটরের ব্যাকগ্রাউন্ড গ্রে করা */
        .ql-disabled .ql-editor {
            background-color: #f9f9f9;
            color: #555;
            cursor: not-allowed;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .status {
            font-size: 12px;
            color: #999;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Space</h1>
    <p>সাহিত্যের পাতায় হারিয়ে যাওয়া আর প্রযুক্তির নতুন দিগন্ত খোঁজা - এই দুইয়ের মাঝেই আমার জগৎ। 📚</p>
    
    <div id="editor-container"></div>
    
    <div class="controls">
        <button id="authBtn" onclick="toggleEdit()">Unlock to Edit</button>
        <div id="status" class="status">ক্লাউড ডাটা লোড হচ্ছে...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

<script>
    // আপনার আসল Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyDiEaU3tA4Mjpuh75DZuvxqrUJ-hYKSn_w",
        authDomain: "sadikul-21e04.firebaseapp.com",
        databaseURL: "https://sadikul-21e04-default-rtdb.firebaseio.com",
        projectId: "sadikul-21e04",
        storageBucket: "sadikul-21e04.firebasestorage.app",
        messagingSenderId: "117715005313",
        appId: "1:117715005313:web:340a3aa9b4366b817c4280",
        measurementId: "G-Y7K47QQ800"
    };

    // Firebase ইনিশিয়ালাইজ করা
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const noteRef = database.ref('public_html_note'); // HTML ফরম্যাট সেভ করার জন্য নতুন নোড

    const status = document.getElementById('status');
    const authBtn = document.getElementById('authBtn');
    
    let isAuthorized = false;

    // Quill Editor কনফিগার করা (এখানে Bold, Italic, Underline এবং Link অপশন দেওয়া হয়েছে)
    const quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'], // টেক্সট ফরম্যাটিং বোতাম
                ['link'],                       // লিংক যুক্ত করার বোতাম
                [{ 'clean': 'Clear' }]          // ফরম্যাট মুছে ফেলার বোতাম
            ]
        },
        placeholder: 'ক্লাউড ডাটা লোড হচ্ছে...',
        theme: 'snow',
        readOnly: true // শুরুতে লক থাকবে
    });

    // ১. ক্লাউড থেকে রিয়েল-টাইম HTML ডাটা নিয়ে আসা
    noteRef.on('value', (snapshot) => {
        if (!isAuthorized) {
            const htmlContent = snapshot.val() || "";
            quill.clipboard.dangerouslyPasteHTML(htmlContent); // HTML ফরম্যাট সহ পেস্ট করা
            status.textContent = "Viewing Mode (Read-Only)";
        }
    });

    // ২. পাসওয়ার্ড ভেরিফিকেশন এবং লক/আনলক লজিক
    function toggleEdit() {
        if (!isAuthorized) {
            const password = prompt("এডিট করার জন্য পাসওয়ার্ড দিন:");
            
            if (password === "365365") {
                isAuthorized = true;
                quill.enable(true); // এডিটর আনলক করা
                authBtn.textContent = "Lock Editing";
                authBtn.style.backgroundColor = "#dc3545"; 
                status.textContent = "Unlocked. পরিবর্তনগুলো ক্লাউডে সেভ হচ্ছে।";
                quill.focus();
            } else if (password !== null) {
                alert("ভুল পাসওয়ার্ড! এক্সেস রিফিউজড।");
            }
        } else {
            status.textContent = "সর্বশেষ পরিবর্তনগুলো সেভ হচ্ছে...";
            
            // এডিটরের ভেতরের HTML কোডটি ক্লাউডে সেভ করা হচ্ছে
            const currentHTML = quill.getSemanticHTML(); 
            
            noteRef.set(currentHTML)
                .then(() => {
                    isAuthorized = false;
                    quill.enable(false); // এডিটর লক করা
                    authBtn.textContent = "Unlock to Edit";
                    authBtn.style.backgroundColor = "#007bff";
                    status.textContent = "Saved & Locked! (Read-Only Mode)";
                })
                .catch((error) => {
                    alert("ফাইনাল সেভ করতে সমস্যা হয়েছে: " + error.message);
                });
        }
    }

    // ৩. টাইপ অথবা ফরম্যাট করার সাথে সাথে লাইভ ক্লাউড সেভ
    quill.on('text-change', (delta, oldDelta, source) => {
        if (!isAuthorized || source !== 'user') return;
        
        status.textContent = "ক্লাউডে সেভ হচ্ছে...";
        const currentHTML = quill.getSemanticHTML();
        
        noteRef.set(currentHTML)
            .then(() => {
                status.textContent = "Saved!";
            })
            .catch((error) => {
                status.textContent = "Sync error: " + error.message;
            });
    });
</script>

</body>
</html>
